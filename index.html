// API
async function api(path){
  const r=await fetch(path);
  if(!r.ok)throw new Error('API error');
  return r.json();
}

// Watchlist
function wlList(){try{return(JSON.parse(localStorage.getItem('wf_wl')||'[]')).filter(x=>x&&x.slug)}catch(e){return[]}}
function wlToggle(item){let l=wlList();const i=l.findIndex(x=>x.slug===item.slug);if(i>=0)l.splice(i,1);else l.push(item);localStorage.setItem('wf_wl',JSON.stringify(l));return i<0}
function wlHas(slug){return wlList().some(x=>x.slug===slug)}

// Continue watching
function cwList(){try{return(JSON.parse(localStorage.getItem('wf_cw')||'[]')).filter(x=>x&&x.slug)}catch(e){return[]}}
function cwRemove(slug){localStorage.setItem('wf_cw',JSON.stringify(cwList().filter(x=>x.slug!==slug)))}

// Tile renderer
function tile(m){
  const isSeries=(m.contentType==='series');
  const a=document.createElement('a');a.className='tile';a.href='#';
  const p=poster(m.posterPath);
  const rt=m.voteAverage?Number(m.voteAverage).toFixed(1):'';
  const ty=yr(m.releaseDate||m.firstAirDate||'');
  a.innerHTML=`<div class="poster"><img loading="lazy" src="${p}" onerror="this.style.opacity=.15">${m.quality?`<span class="q">${m.quality}</span>`:''}${rt?`<span class="rt">★ ${rt}</span>`:''}</div><h3>${esc(m.title||'')}${ty?` <span class="yr">(${ty})</span>`:''}</h3>`;
  a.onclick=e=>{e.preventDefault();openDetail(m.slug,isSeries)};
  return a;
}

function continueTile(m){
  const a=document.createElement('a');a.className='cw-tile';a.href='#';
  const bg=poster(m.backdrop,'/w780')||poster(m.poster,'/w500');
  const seBadge=m.season&&m.episode?`S${String(m.season).padStart(2,'0')}E${String(m.episode).padStart(2,'0')}`:(m.kind==='series'?t('badge_series'):t('badge_movie'));
  const pct=(m.dur&&m.t)?Math.min(99,Math.round(m.t/m.dur*100)):0;
  a.innerHTML=`<div class="cw-thumb"><img loading="lazy" src="${bg}" onerror="this.style.opacity=.15"><span class="cw-se">${seBadge}</span><button class="cw-x">×</button><div class="cw-play">▶</div><div class="cw-bar"><span style="width:${pct}%"></span></div></div><h3>${esc(m.title||'')}${m.year?` <span class="yr">(${m.year})</span>`:''}</h3>`;
  a.querySelector('.cw-x').onclick=e=>{e.preventDefault();e.stopPropagation();cwRemove(m.slug);a.remove()};
  a.onclick=e=>{e.preventDefault();openDetail(m.slug,m.kind==='series')};
  return a;
}

// Drag scroll
function enableDragScroll(el){
  if(!el||el._dragHooked)return;el._dragHooked=true;
  let down=false,startX=0,startScroll=0,moved=0;
  el.addEventListener('mousedown',e=>{down=true;moved=0;startX=e.pageX;startScroll=el.scrollLeft});
  el.addEventListener('mousemove',e=>{if(!down)return;const dx=e.pageX-startX;if(Math.abs(dx)>4){el.classList.add('drag');moved=Math.abs(dx)}el.scrollLeft=startScroll-dx});
  const end=()=>{down=false;setTimeout(()=>el.classList.remove('drag'),0)};
  el.addEventListener('mouseup',end);el.addEventListener('mouseleave',end);
  el.addEventListener('click',e=>{if(moved>4){e.preventDefault();e.stopPropagation()}},true);
}

// Hero
let _heroTimer=null;
function renderHero(items,heroEl,mode){
  const h=heroEl||document.getElementById('hero');
  const slides=(items||[]).slice(0,10);
  if(!slides.length)return;
  if(_heroTimer){clearInterval(_heroTimer);_heroTimer=null}
  const HERO_MS=8000;
  h.innerHTML=slides.map((m,i)=>{
    const bg=poster(m.backdropPath,'/original')||poster(m.posterPath,'/w780');
    const isSeries=m.contentType==='series';
    const rt=m.voteAverage?Number(m.voteAverage).toFixed(1):'';
    const genres=(m.genres||[]).slice(0,3).map(g=>g.name||g).join(', ');
    return`<div class="hero-slide${i===0?' active':''}" data-i="${i}"><div class="hero-bg" style="background-image:url('${bg}')"></div><div class="hero-content"><div class="hero-badges"><span class="hero-rank">${mode==='latest'?t('hero_new'):('#'+(i+1)+' '+t('top_today'))}</span><span class="hero-type">${isSeries?t('badge_series'):t('badge_movie')}</span></div><h1>${esc(m.title||'')}</h1><div class="hero-meta">${rt?`<span class="r">★ ${rt}</span>`:''}<span>${yr(m.releaseDate||m.firstAirDate||'')}</span>${m.runtime?`<span>${fmtDur(m.runtime)}</span>`:''}${genres?`<span>${esc(genres)}</span>`:''}</div><p>${esc(m.overview||'')}</p><button class="btn-play" onclick="openDetail('${m.slug}',${isSeries})">▶ ${t('play')}</button></div></div>`;
  }).join('')+`<div class="hero-dots">${slides.map((_,i)=>`<button class="hero-dot${i===0?' active':''}" data-i="${i}"><span class="hero-dot-fill"></span></button>`).join('')}</div>`;
  let cur=0;const slideEls=h.querySelectorAll('.hero-slide'),dotEls=h.querySelectorAll('.hero-dot');
  function animProg(){dotEls.forEach(d=>{const f=d.querySelector('.hero-dot-fill');if(f){f.style.transition='none';f.style.width='0%'}});const af=dotEls[cur]?.querySelector('.hero-dot-fill');if(!af)return;void af.offsetWidth;af.style.transition='width '+HERO_MS+'ms linear';af.style.width='100%'}
  function show(n){const prev=cur;cur=(n+slideEls.length)%slideEls.length;slideEls.forEach((el,i)=>{el.classList.remove('prev');if(i===prev&&prev!==cur)el.classList.add('prev');el.classList.toggle('active',i===cur)});dotEls.forEach((el,i)=>el.classList.toggle('active',i===cur))}
  function restart(){if(_heroTimer)clearInterval(_heroTimer);animProg();_heroTimer=setInterval(()=>{show(cur+1);animProg()},HERO_MS)}
  dotEls.forEach(d=>d.onclick=()=>{show(+d.dataset.i);restart()});
  restart();
}

// Row skeleton
function rowSkeleton(title){
  const sec=document.createElement('div');sec.className='row';
  let sk='';for(let i=0;i<7;i++)sk+='<div class="tile-sk"><div class="poster"></div></div>';
  sec.innerHTML=`<h2>${title}</h2><div class="row-scroll">${sk}</div>`;return sec;
}

// Home page
async function renderHome(){
  homeview.classList.remove('hide');gridview.classList.remove('show');playerPage.classList.remove('show');
  hero.innerHTML='';rows.innerHTML='';bar(20);
  // Continue watching
  const cw=cwList();
  if(cw.length){
    const sec=document.createElement('div');sec.className='row';
    sec.innerHTML=`<h2>${t('row_continue')}</h2><div class="row-scroll"></div>`;
    const scroll=sec.querySelector('.row-scroll');cw.forEach(m=>scroll.appendChild(continueTile(m)));
    enableDragScroll(scroll);rows.appendChild(sec);
  }
  // Hero: latest
  try{
    const hj=await api(`/api/browse?kind=${kind}&sort=latest&page=1`);
    if(hj.data&&hj.data.length)renderHero(hj.data,null,'latest');
  }catch(e){}
  bar(40);
  // Rows
  const defs=kind==='movies'?[
    {key:'row_popular',q:'sort=popular'},{key:'row_latest',q:'sort=latest'},
    {title:'Action',q:'genre=action'},{title:'Horror',q:'genre=horror'},{title:'Comedy',q:'genre=comedy'},{title:'Drama',q:'genre=drama'},{title:'Animation',q:'genre=animation'},{title:'Science Fiction',q:'genre=science-fiction'}
  ]:[
    {key:'row_popular',q:'sort=popular'},{key:'row_latest',q:'sort=latest'},
    {title:'Action & Adventure',q:'genre=action-adventure'},{title:'Drama',q:'genre=drama'},{title:'Comedy',q:'genre=comedy'},{title:'Crime',q:'genre=crime'},{title:'Animation',q:'genre=animation'},{title:'Sci-Fi & Fantasy',q:'genre=sci-fi-fantasy'}
  ];
  const secs=defs.map(d=>{const s=rowSkeleton(d.key?t(d.key):d.title);rows.appendChild(s);return s});
  for(let i=0;i<defs.length;i++){
    try{
      const j=await api(`/api/browse?kind=${kind}&${defs[i].q}&page=1`);
      const items=j.data||[];const scroll=secs[i].querySelector('.row-scroll');scroll.innerHTML='';
      items.forEach(m=>scroll.appendChild(tile(m)));enableDragScroll(scroll);
      if(!items.length)secs[i].remove();
    }catch(e){secs[i].remove()}
    bar(40+(i+1)/defs.length*55);
  }
  bar(100);
}

// Browse/grid
let curBrowse=null;
function renderBrowse(filter,title,page,kindOverride){
  if(page===1){curBrowse={filter,title,page:1,totalPages:1,loading:false,kind:kindOverride||kind};homeview.classList.add('hide');gridview.classList.add('show');playerPage.classList.remove('show');gridtitle.textContent=title;
    // Sort pills
    const oldP=document.getElementById('sortPills');if(oldP)oldP.remove();
    const bar2=document.createElement('div');bar2.id='sortPills';bar2.className='sort-pills';
    [{key:'popular',label:'sort_popular'},{key:'latest',label:'sort_latest'},{key:'release',label:'sort_release'},{key:'rating',label:'sort_rating'}].forEach(o=>{
      const b=document.createElement('button');b.className='sort-pill'+(o.key===(curBrowse.filter.match(/sort=([^&]+)/)||[])[1]?' act':'');b.textContent=t(o.label);b.onclick=()=>{if(curBrowse){curBrowse.filter=curBrowse.filter.replace(/sort=[^&]+/,'sort='+o.key);bar2.querySelectorAll('.sort-pill').forEach(x=>x.classList.remove('act'));b.classList.add('act');renderBrowse(curBrowse.filter,title,1,curBrowse.kind)}};bar2.appendChild(b);
    });
    gridtitle.insertAdjacentElement('afterend',bar2);
    grid.innerHTML='';for(let i=0;i<12;i++){const sk=document.createElement('div');sk.className='tile-sk';sk.innerHTML='<div class="poster"></div>';grid.appendChild(sk)}
    scrollTo(0,0);
  }
  if(!curBrowse)return;curBrowse.loading=true;bar(30);
  api(`/api/browse?kind=${curBrowse.kind}&${filter}&page=${page}`).then(j=>{
    const items=j.data||[];const pg=j.pagination||{};
    curBrowse.page=pg.page||page;curBrowse.totalPages=pg.totalPages||1;
    if(page===1)grid.innerHTML='';
    items.forEach(m=>grid.appendChild(tile(m)));
    if(!items.length&&page===1)grid.innerHTML=`<p style="color:#9a9aa5">${t('no_result')}</p>`;
    curBrowse.loading=false;bar(100);
    // Infinite scroll
    if(!scrollHooked){scrollHooked=true;window.addEventListener('scroll',()=>{if(!gridview.classList.contains('show')||!curBrowse)return;if(curBrowse.loading||curBrowse.page>=curBrowse.totalPages)return;if(window.innerHeight+scrollY>=document.body.offsetHeight-700)renderBrowse(curBrowse.filter,curBrowse.title,curBrowse.page+1)},{passive:true})}
  }).catch(()=>{curBrowse.loading=false;bar(100)});
}

// Detail & Player
let detailCache=null;
async function openDetail(slug,isSeries){
  const k=isSeries?'series':'movies';
  bar(30);
  try{
    const d=await api(`/api/detail?kind=${k}&slug=${encodeURIComponent(slug)}`);
    detailCache=d;
    showPlayerPage(d,k);
  }catch(e){alert(t('load_fail'))}
  bar(100);
}

function showPlayerPage(d,k){
  homeview.classList.remove('hide');gridview.classList.remove('show');playerPage.classList.add('show');
  hdr.classList.remove('solid');
  // Info
  const info=document.getElementById('playerInfo');
  const genres=(d.genres||[]).map(g=>g.name||g).join(', ');
  const rating=d.voteAverage?Number(d.voteAverage).toFixed(1):'';
  const yr2=yr(d.releaseDate||d.firstAirDate||'');
  const inWl=wlHas(d.slug);
  info.innerHTML=`<h1>${esc(d.title||'')}</h1><div class="tags">${d.quality?`<span class="tag q">${d.quality}</span>`:''}<span class="tag">${yr2}</span>${d.runtime?`<span class="tag">${d.runtime} ${t('minutes')}</span>`:''}${rating?`<span class="rating-badge">★ ${rating}</span>`:''}</div>${genres?`<p class="genres">${esc(genres)}</p>`:''}<p class="overview">${esc(d.overview||'')}</p><button class="btn-play" id="wlBtn" style="background:${inWl?'#22c55e':'#ffffff1a'};border:1px solid #ffffff22;margin-right:10px">${inWl?'✓ Saved':'＋ Watchlist'}</button>`;
  document.getElementById('wlBtn').onclick=function(){const added=wlToggle({slug:d.slug,title:d.title,poster:d.posterPath,kind:k==='series'?'series':'movie'});this.textContent=added?'✓ Saved':'＋ Watchlist';this.style.background=added?'#22c55e':'#ffffff1a'};

  // Episodes for series
  const epSection=document.getElementById('epSection');
  if(k==='series'&&d.seasons&&d.seasons.length){
    epSection.style.display='block';
    const sel=document.getElementById('seasonSel');sel.innerHTML='';
    d.seasons.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`Season ${s.seasonNumber||i+1}`;sel.appendChild(o)});
    sel.onchange=()=>loadEpisodes(d,sel.value);
    loadEpisodes(d,0);
  }else{epSection.style.display='none'}

  // Start playback
  startPlayback(d,k);
}

async function startPlayback(d,k){
  const statusBox=document.getElementById('statusBox');
  const statusBig=document.getElementById('statusBig');
  const statusMsg=document.getElementById('statusMsg');
  statusBox.style.display='flex';
  statusBig.textContent=t('prep_stream');
  statusMsg.textContent='';

  // Poster overlay
  const box=document.getElementById('playerBox');
  const oldPoster=document.getElementById('posterOverlay');if(oldPoster)oldPoster.remove();
  const bg=poster(d.backdropPath,'/original')||poster(d.posterPath,'/w780');
  const ov=document.createElement('div');ov.className='poster-overlay';ov.id='posterOverlay';
  if(bg)ov.style.backgroundImage=`url('${bg}')`;
  ov.innerHTML=`<button class="big-play">▶</button>`;
  box.appendChild(ov);
  statusBox.style.display='none';

  ov.onclick=async()=>{
    ov.remove();statusBox.style.display='flex';statusBig.textContent=t('prep_stream');
    try{
      const j=await api(`/api/play?content_id=${d.id}&content_type=${k==='series'?'series':'movie'}`);
      if(!j.m3u8)throw new Error('No stream');
      statusBox.style.display='none';
      playM3U8(j.m3u8,j.subtitles||[]);
    }catch(e){
      statusBig.textContent=t('play_fail');statusMsg.textContent=t('stream_expired');
      // Retry button
      const btn=document.createElement('button');btn.textContent=t('retry');btn.className='btn-play';btn.style.marginTop='10px';btn.onclick=()=>{statusBox.style.display='none';ov.remove();startPlayback(d,k)};
      statusBox.appendChild(btn);
    }
  };
}

function playM3U8(url,subs){
  // Cleanup
  if(plyrInstance){try{plyrInstance.destroy()}catch(e){}plyrInstance=null}
  if(hlsInstance){try{hlsInstance.destroy()}catch(e){}hlsInstance=null}
  const box=document.getElementById('playerBox');
  let vEl=box.querySelector('video');
  if(!vEl){vEl=document.createElement('video');vEl.id='video';vEl.setAttribute('playsinline','');vEl.setAttribute('crossorigin','anonymous');vEl.setAttribute('controls','');box.appendChild(vEl)}
  // Subtitles
  (subs||[]).forEach(s=>{const t2=document.createElement('track');t2.kind='captions';t2.label=s.label||s.lang;t2.srclang=s.lang||'en';t2.src=s.path;vEl.appendChild(t2)});

  if(window.Hls&&Hls.isSupported()){
    hlsInstance=new Hls({maxBufferLength:90,maxMaxBufferLength:300,maxBufferSize:100*1000*1000,backBufferLength:90});
    hlsInstance.loadSource(url);hlsInstance.attachMedia(vEl);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{
      plyrInstance=new Plyr(vEl,{captions:{active:true,update:true},settings:['captions','quality','speed'],seekTime:10,keyboard:{focused:true,global:true},controls:['play-large','play','rewind','fast-forward','progress','current-time','duration','mute','volume','captions','settings','pip','fullscreen']});
      vEl.play().catch(()=>{});
    });
    hlsInstance.on(Hls.Events.ERROR,(e,d2)=>{
      if(!d2.fatal)return;
      if(d2.type===Hls.ErrorTypes.NETWORK_ERROR){try{hlsInstance.startLoad();return}catch(e2){}}
      if(d2.type===Hls.ErrorTypes.MEDIA_ERROR){try{hlsInstance.recoverMediaError();return}catch(e2){}}
    });
  }else if(vEl.canPlayType('application/vnd.apple.mpegurl')){
    vEl.src=url;
    plyrInstance=new Plyr(vEl,{captions:{active:true},settings:['captions','quality','speed'],controls:['play-large','play','progress','current-time','duration','mute','volume','captions','settings','fullscreen']});
    vEl.addEventListener('loadedmetadata',()=>vEl.play().catch(()=>{}));
  }
}

async function loadEpisodes(d,seasonIdx){
  const epGrid=document.getElementById('epGrid');epGrid.innerHTML='Loading...';
  const season=d.seasons[seasonIdx];if(!season){epGrid.innerHTML='No episodes';return}
  try{
    const eps=await api(`/api/episodes?content_id=${d.id}&season_number=${season.seasonNumber||seasonIdx+1}`);
    epGrid.innerHTML='';
    (eps||[]).forEach(ep=>{
      const card=document.createElement('div');card.className='ep-card';
      const st=ep.stillPath?poster(ep.stillPath,'/w300'):'';
      card.innerHTML=`<div class="ep-thumb"><img src="${st}" onerror="this.style.opacity=.12"><span class="ep-num">E${ep.episodeNumber||''}</span></div><div class="ep-info"><h3>${esc(ep.name||`Episode ${ep.episodeNumber}`)}</h3><p>${esc(ep.overview||'')}</p></div>`;
      card.onclick=()=>playEpisode(d,season.seasonNumber||seasonIdx+1,ep);
      epGrid.appendChild(card);
    });
  }catch(e){epGrid.innerHTML='Failed to load episodes'}
}

async function playEpisode(d,seasonNum,ep){
  const statusBox=document.getElementById('statusBox');
  statusBox.style.display='flex';
  document.getElementById('statusBig').textContent='Loading episode...';
  document.getElementById('statusMsg').textContent='';
  try{
    const j=await api(`/api/play?content_id=${d.id}&content_type=series&episode_id=${ep.id}`);
    if(!j.m3u8)throw new Error('No stream');
    statusBox.style.display='none';
    playM3U8(j.m3u8,j.subtitles||[]);
  }catch(e){
    document.getElementById('statusBig').textContent=t('play_fail');
    document.getElementById('statusMsg').textContent=t('stream_expired');
  }
}

// Back button
document.getElementById('backBtn').onclick=()=>{playerPage.classList.remove('show');if(hlsInstance){try{hlsInstance.destroy()}catch(e){}hlsInstance=null}if(plyrInstance){try{plyrInstance.destroy()}catch(e){}plyrInstance=null}};

// Router
function go(path){history.pushState({},'',path);route()}
function setActive(k){document.querySelectorAll('.nav a').forEach(x=>x.classList.remove('active'));if(k){const el=document.querySelector(`.nav a[data-kind="${k}"]`);if(el)el.classList.add('active');else if(k==='navhome')document.getElementById('navhome')?.classList.add('active');else if(k==='navgenre')document.getElementById('navgenre')?.classList.add('active');else if(k==='navwatchlist')document.getElementById('navwatchlist')?.classList.add('active')}}
function route(){
  const p=decodeURIComponent(location.pathname);grid.classList.remove('genre-cards');
  const oldP=document.getElementById('sortPills');if(oldP)oldP.remove();
  if(p.match(/^\/(movie|series)\//)){const m=p.match(/^\/(movie|series)\/(.+)/);if(m)openDetail(m[2],m[1]==='series')}
  else if(p==='/movie'||p==='/movie/'){kind='movies';setActive('movies');renderBrowse('sort=popular',t('nav_movies'),1,'movies')}
  else if(p==='/series'||p==='/series/'){kind='series';setActive('series');renderBrowse('sort=popular',t('nav_series'),1,'series')}
  else if(p==='/genre'||p==='/genre/'){setActive('navgenre');renderGenreIndex()}
  else if(p==='/watchlist'||p==='/watchlist/'){setActive('navwatchlist');renderWatchlist()}
  else if(p.startsWith('/genre/')){setActive('navgenre');const g=p.slice(7);renderBrowse(`genre=${g}&sort=popular`,`Genre: ${g}`,1)}
  else{setActive('navhome');renderHome()}
}
document.querySelectorAll('.nav a[data-kind]').forEach(a=>a.onclick=()=>{kind=a.dataset.kind;qInput.value='';scrollTo(0,0);go(kind==='series'?'/series':'/movie')});
document.getElementById('navhome').onclick=e=>{e.preventDefault();qInput.value='';go('/')};
document.getElementById('navgenre').onclick=e=>{e.preventDefault();qInput.value='';go('/genre')};
document.getElementById('navwatchlist').onclick=e=>{e.preventDefault();qInput.value='';go('/watchlist')};
qInput.oninput=()=>{clearTimeout(searchTimer);const v=qInput.value.trim();searchTimer=setTimeout(()=>{if(v)renderSearch(v);else route()},450)};
window.addEventListener('popstate',route);
route();
</script>
</body>
</html>
