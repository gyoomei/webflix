// ===== HELPERS =====
const loadbar=document.getElementById('loadbar');
function bar(p){loadbar.style.width=p+'%';if(p>=100)setTimeout(()=>loadbar.style.width=0,300)}
function poster(p,sz){return p?(p.startsWith('http')?p:TMDB+(sz||'/w342')+p):''}
function yr(d){return(d||'').slice(0,4)}
function fmtDur(m){m=Number(m)||0;if(!m)return'';const h=Math.floor(m/60),mm=m%60;return(h?h+'h':'')+(h&&mm?' ':'')+(mm?mm+'m':'')}
function esc(s){return(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

// ===== CONTINUE WATCHING (localStorage) =====
function cwList(){try{return(JSON.parse(localStorage.getItem('wf_cw')||'[]')).filter(x=>x&&x.slug)}catch(e){return[]}}
function cwRemove(slug){localStorage.setItem('wf_cw',JSON.stringify(cwList().filter(x=>x.slug!==slug)))}
function cwAdd(item){const l=cwList().filter(x=>x.slug!==item.slug);l.unshift(item);if(l.length>20)l.pop();localStorage.setItem('wf_cw',JSON.stringify(l))}

// ===== WATCHLIST (localStorage) =====
function wlList(){try{return(JSON.parse(localStorage.getItem('wf_wl')||'[]')).filter(x=>x&&x.slug)}catch(e){return[]}}
function wlToggle(item){let l=wlList();const i=l.findIndex(x=>x.slug===item.slug);if(i>=0)l.splice(i,1);else l.push(item);localStorage.setItem('wf_wl',JSON.stringify(l));return i<0}
function wlHas(slug){return wlList().some(x=>x.slug===slug)}

function logout(){localStorage.removeItem('wf_user');renderAuthSlot()}

// ===== AUTH SLOT =====
function renderAuthSlot(){
  const slot=document.getElementById('wfAuthSlot');
  const u=getUser();
  if(u){
    const hex=u.color||'#e50914';
    slot.innerHTML=`<div class="wf-userwrap"><div class="wf-uchip" id="uchip"><div class="wf-av" style="background:${hex}">${(u.username||'?')[0].toUpperCase()}</div><span class="wf-uname">${esc(u.username)}</span></div><div class="wf-menu" id="wfMenu"><div class="mi" onclick="location='/profile'">👤 ${t('m_profile')}</div><div class="mi" onclick="location='/watchlist'">🔖 ${t('nav_watchlist')}</div><div class="sep"></div><div class="mi" onclick="logout()">🚪 ${t('m_logout')}</div></div></div>`;
    document.getElementById('uchip').onclick=()=>document.getElementById('wfMenu').classList.toggle('open');
    document.addEventListener('click',e=>{const m=document.getElementById('wfMenu');if(m&&!e.target.closest('.wf-userwrap'))m.classList.remove('open')});
  }else{
    slot.innerHTML=`<button class="wf-authbtn" id="authBtn">${t('m_login')}</button>`;
    document.getElementById('authBtn').onclick=()=>openAuth('login');
  }
}

// ===== AUTH MODAL =====
const overlay=document.getElementById('authOverlay');
const authCard=document.getElementById('authCard');
function openAuth(mode){
  overlay.classList.add('open');
  if(mode==='login'){

// ===== DRAG SCROLL =====
function enableDragScroll(el){
  if(!el||el._dragHooked)return;el._dragHooked=true;
  let down=false,startX=0,startScroll=0,moved=0;
  el.addEventListener('mousedown',e=>{down=true;moved=0;startX=e.pageX;startScroll=el.scrollLeft});
  el.addEventListener('mousemove',e=>{if(!down)return;const dx=e.pageX-startX;if(Math.abs(dx)>4){el.classList.add('drag');moved=Math.abs(dx)}el.scrollLeft=startScroll-dx});
  const end=()=>{down=false;setTimeout(()=>el.classList.remove('drag'),0)};
  el.addEventListener('mouseup',end);el.addEventListener('mouseleave',end);
  el.addEventListener('click',e=>{if(moved>4){e.preventDefault();e.stopPropagation()}},true);
}

let _heroTimer=null;
function renderHero(items,heroEl,mode){
  const h=heroEl||document.getElementById('hero');
  const slides=(items||[]).slice(0,8);
  if(!slides.length)return;
  if(_heroTimer){clearInterval(_heroTimer);_heroTimer=null}
  const HERO_MS=8000;
  h.innerHTML=slides.map((m,i)=>{
    const bg=poster(m.backdropPath||m.backdrop,'/original')||poster(m.posterPath||m.poster,'/w780');
    const bgStyle=bg?`background-image:url('${bg}')`:`background:linear-gradient(135deg,#1a1a2e,#0f3460,#16213e)`;
    const isSeries=m.contentType==='series';
    const rt=m.voteAverage?Number(m.voteAverage).toFixed(1):m.rating?Number(m.rating).toFixed(1):'';
    const genres=(m.genres||[]).slice(0,3).map(g=>typeof g==='string'?g:g.name).join(', ');
    return`<div class="hero-slide${i===0?' active':''}" data-i="${i}"><div class="hero-bg" style="${bgStyle}"></div><div class="hero-content"><div class="hero-badges"><span class="hero-rank">${mode==='latest'?t('hero_new'):('#'+(i+1)+' '+t('top_today'))}</span><span class="hero-type">${isSeries?t('badge_series'):t('badge_movie')}</span></div><h1>${esc(m.title||'')}</h1><div class="hero-meta">${rt?`<span class="r">★ ${rt}</span>`:''}<span>${yr(m.releaseDate||m.year||'')}</span>${m.runtime?`<span>${fmtDur(m.runtime)}</span>`:''}${genres?`<span>${esc(genres)}</span>`:''}</div><p>${esc(m.overview||'')}</p><a class="btn-play" href="#" onclick="event.preventDefault();showDetail(MOCK_MOVIES[${i}]||MOCK_SERIES[${i}],${isSeries})">▶ ${t('play')}</a></div></div>`;
  }).join('')+`<div class="hero-dots">${slides.map((_,i)=>`<button class="hero-dot${i===0?' active':''}" data-i="${i}"><span class="hero-dot-fill"></span></button>`).join('')}</div>`;
  let cur=0;const slideEls=h.querySelectorAll('.hero-slide'),dotEls=h.querySelectorAll('.hero-dot');
  function animProg(){dotEls.forEach(d=>{const f=d.querySelector('.hero-dot-fill');if(f){f.style.transition='none';f.style.width='0%'}});const af=dotEls[cur]?.querySelector('.hero-dot-fill');if(!af)return;void af.offsetWidth;af.style.transition='width '+HERO_MS+'ms linear';af.style.width='100%'}
  function show(n){const prev=cur;cur=(n+slideEls.length)%slideEls.length;slideEls.forEach((el,i)=>{el.classList.remove('prev');if(i===prev&&prev!==cur)el.classList.add('prev');el.classList.toggle('active',i===cur)});dotEls.forEach((el,i)=>el.classList.toggle('active',i===cur));if(prev!==cur&&slideEls[prev])setTimeout(()=>{if(!slideEls[prev].classList.contains('active'))slideEls[prev].classList.remove('prev')},650)}
  function restart(){if(_heroTimer)clearInterval(_heroTimer);animProg();_heroTimer=setInterval(()=>{show(cur+1);animProg()},HERO_MS)}
  dotEls.forEach(d=>d.onclick=()=>{show(+d.dataset.i);restart()});
  let dragX=null,dragging=false;
  h.addEventListener('touchstart',e=>{dragX=e.touches[0].clientX;dragging=true},{passive:true});
  h.addEventListener('touchend',e=>{if(!dragging)return;const dx=e.changedTouches[0].clientX-dragX;dragging=false;if(Math.abs(dx)>45)show(cur+(dx<0?1:-1));restart()},{passive:true});
  restart();
}

const ROWS_MOVIES=[
  {key:'row_popular',q:'popular'},{key:'row_latest',q:'latest'},
  {title:'Action',filter:'Action'},{title:'Horror',filter:'Horror'},{title:'Comedy',filter:'Comedy'},{title:'Drama',filter:'Drama'},{title:'Animation',filter:'Animation'},{title:'Sci-Fi',filter:'Sci-Fi'}

const ROWS_SERIES=[
  {key:'row_popular',q:'popular'},{key:'row_latest',q:'latest'},
  {title:'Drama',filter:'Drama'},{title:'Comedy',filter:'Comedy'},{title:'Action',filter:'Action'},{title:'Sci-Fi',filter:'Sci-Fi'},{title:'Animation',filter:'Animation'},{title:'Fantasy',filter:'Fantasy'}
];

function mockBrowse(kindDef,filter,page){
  const data=kindDef==='series'?MOCK_SERIES:MOCK_MOVIES;
  let items=[...data];
  if(filter==='popular')items.sort((a,b)=>(b.rating||0)-(a.rating||0));
  else if(filter==='latest')items.sort((a,b)=>(b.year||'').localeCompare(a.year||''));
  else if(filter&&GENRES.includes(filter))items=items.filter(m=>(m.genres||[]).some(g=>g.toLowerCase().includes(filter.toLowerCase())));
  const perPage=18;const start=((page||1)-1)*perPage;
  return{data:items.slice(start,start+perPage),pagination:{page:page||1,totalPages:Math.ceil(items.length/perPage)}};
}

function rowSkeleton(title){
  const sec=document.createElement('div');sec.className='row';

  sec.innerHTML=`<h2>${title}</h2><div class="row-scroll">${sk}</div>`;
  return sec;
}

function route(){

  else if(p==='/genre'||p==='/genre/'){setActive('navgenre');renderGenreIndex()}
  else if(p==='/watchlist'||p==='/watchlist/'){setActive('navwatchlist');renderWatchlist()}
  else if(p.startsWith('/genre/')){setActive('navgenre');const g=p.slice(7);const items=[...MOCK_MOVIES,...MOCK_SERIES].filter(m=>(m.genres||[]).some(gg=>gg.toLowerCase().includes(g.toLowerCase())));renderGrid(items,`Genre: ${g}`,false)}
  else if(p==='/profile'){renderProfile()}
  else{setActive('navhome');renderHome()}
}
function setActive(k){
  document.querySelectorAll('.nav a').forEach(x=>x.classList.remove('active'));
  if(k){const el=document.querySelector(`.nav a[data-kind="${k}"]`);if(el)el.classList.add('active');else if(k==='navhome')document.getElementById('navhome')?.classList.add('active');else if(k==='navgenre')document.getElementById('navgenre')?.classList.add('active');else if(k==='navwatchlist')document.getElementById('navwatchlist')?.classList.add('active')}
}
document.querySelectorAll('.nav a[data-kind]').forEach(a=>a.onclick=()=>{kind=a.dataset.kind;qInput.value='';scrollTo(0,0);go(kind==='series'?'/series':'/movie')});
document.getElementById('navhome').onclick=e=>{e.preventDefault();qInput.value='';go('/')};
document.getElementById('navgenre').onclick=e=>{e.preventDefault();qInput.value='';go('/genre')};
document.getElementById('navwatchlist').onclick=e=>{e.preventDefault();qInput.value='';go('/watchlist')};

qInput.oninput=()=>{clearTimeout(searchTimer);const v=qInput.value.trim();searchTimer=setTimeout(()=>{if(v)renderSearch(v);else route()},450)};
window.addEventListener('popstate',route);

// ===== PROFILE PAGE =====
function renderProfile(){
  const u=getUser();
  if(!u){openAuth('login');return}
  homeview.classList.add('hide');gridview.classList.add('show');
  gridtitle.textContent='';grid.innerHTML='';grid.classList.remove('genre-cards');
  const hex=u.color||'#e50914';
  const favs=[];const wl=wlList();const cw=cwList();
  grid.innerHTML=`<div style="max-width:880px;margin:0 auto;padding:4px 2px">
    <div style="background:linear-gradient(180deg,#ffffff0e,#ffffff04);border:1px solid #ffffff14;border-radius:20px;overflow:hidden;margin-bottom:30px">
      <div style="height:112px;background:linear-gradient(135deg,${hex}55,${hex}0d)"></div>
      <div style="display:flex;align-items:flex-end;gap:20px;padding:0 26px;margin-top:-42px;flex-wrap:wrap">
        <div style="width:98px;height:98px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:40px;color:#fff;flex:0 0 auto;border:4px solid #14141b;background:${hex}">${(u.username||'?')[0].toUpperCase()}</div>
        <div style="flex:1;min-width:210px;padding-bottom:6px">
          <div style="font-size:25px;font-weight:800;color:#fff">${esc(u.username)}</div>
          <div style="font-size:13px;color:#7a7a85;margin-top:5px">@${esc(u.username)} · ${esc(u.email||'')}</div>
          <div style="font-size:13.5px;color:#9a9aa5;margin-top:9px;display:flex;gap:8px;flex-wrap:wrap">
            <span style="display:inline-flex;align-items:center;gap:6px;background:#ffffff0d;border:1px solid #ffffff12;border-radius:999px;padding:5px 12px">📅 Bergabung ${new Date(u.created).toLocaleDateString('id-ID')}</span>
            <span style="display:inline-flex;align-items:center;gap:6px;background:#ffffff0d;border:1px solid #ffffff12;border-radius:999px;padding:5px 12px">🔖 ${wl.length} watchlist</span>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding:18px 26px 22px">
        <button class="up-btn" onclick="logout();renderHome()">🚪 ${t('m_logout')}</button>
      </div>
    </div>
    <h3 style="font-size:19px;font-weight:700;color:#fff;margin:0 0 16px;display:flex;align-items:center;gap:10px"><span style="display:inline-block;width:4px;height:20px;border-radius:3px;background:var(--accent)"></span>Watchlist (${wl.length})</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;margin-bottom:30px">
      ${wl.length?wl.map(w=>{const p2=poster(w.poster,'/w342');return`<a style="text-decoration:none;color:#d4d4dc" href="#" onclick="event.preventDefault();const m=MOCK_${w.kind==='series'?'SERIES':'MOVIES'}.find(x=>x.slug==='${w.slug}');if(m)showDetail(m,${w.kind==='series'})"><div style="aspect-ratio:2/3;border-radius:12px;overflow:hidden;background:#ffffff08;border:1px solid #ffffff0e"><img src="${p2}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.opacity=.12"></div><h4 style="font-size:13px;font-weight:600;margin:8px 2px 0;line-height:1.35;color:#cfcfd8">${esc(w.title||'')}</h4></a>`}).join(''):'<div style="color:#8a8a94;font-size:14px;padding:26px 0;text-align:center">Belum ada watchlist.</div>'}
    </div>
    <h3 style="font-size:19px;font-weight:700;color:#fff;margin:0 0 16px;display:flex;align-items:center;gap:10px"><span style="display:inline-block;width:4px;height:20px;border-radius:3px;background:var(--accent)"></span>Lanjut Nonton (${cw.length})</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
      ${cw.length?cw.map(w=>`<a style="text-decoration:none;color:#d4d4dc" href="#" onclick="event.preventDefault()"><div style="aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#ffffff08;border:1px solid #ffffff0e"><img src="${poster(w.backdrop||w.poster,'/w500')}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.opacity=.12"></div><h4 style="font-size:13px;font-weight:600;margin:8px 2px 0;color:#cfcfd8">${esc(w.title||'')}</h4></a>`).join(''):'<div style="color:#8a8a94;font-size:14px;padding:26px 0;text-align:center">Belum ada aktivitas nonton.</div>'}
    </div>
  </div>`;
  bar(100);scrollTo(0,0);
}

// ===== INIT =====
route();
</script>
</body>
